name: Release Dependency Updates

on:
  workflow_call:
    inputs:
      branch:
        description: Branch to inspect and release from.
        required: false
        type: string
        default: main
    secrets:
      github-token:
        description: Token used to read commits and create the release.
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout github-actions repository
        uses: actions/checkout@v6
        with:
          repository: js-soft/github-actions
          ref: main

      - name: Setup nodejs
        uses: actions/setup-node@v6
        with:
          node-version: current

      - name: Install dependencies
        run: npm ci

      - name: Create release for dependency updates
        run: npm run release-dependency-updates
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
          RELEASE_BRANCH: ${{ inputs.branch }}
